services:
  db:
    image: postgres:16-alpine
    container_name: gradion-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: expense_db
      POSTGRES_USER: expense_user
      POSTGRES_PASSWORD: expense_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: gradion-api
    restart: unless-stopped
    env_file:
      - ./apps/api/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://expense_user:expense_pass@db:5432/expense_db
      UPLOAD_DIR: /app/storage/uploads
      JWT_SECRET: change-me-in-real-env
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./apps/api:/app
      - ./storage:/app/storage

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: gradion-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    command: sh -c "pnpm install --frozen-lockfile && pnpm dev --hostname 0.0.0.0 --port 3000"
    depends_on:
      - api
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules

volumes:
  postgres_data:
  web_node_modules:
